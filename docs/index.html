<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bourse">
<meta name="theme-color" content="#0f0f1a">
<title>Agent Bourse V4</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#20203a;--border:#2a2a45;
  --text:#f0f0f0;--muted:#7777aa;--green:#4caf7d;--red:#ef5350;
  --yellow:#ffd54f;--blue:#64b5f6;--orange:#ffb74d;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh;padding-bottom:calc(20px + env(safe-area-inset-bottom))}

/* ── ÉCRAN PIN ── */
#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
#pin-screen h2{font-size:20px;font-weight:600;margin-bottom:6px}
#pin-screen p{font-size:13px;color:var(--muted);margin-bottom:32px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border);transition:background .15s}
.pin-dot.filled{background:var(--blue)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px}
.pin-btn{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:72px;height:72px;font-size:22px;font-weight:500;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-btn:active{background:var(--surface)}
.pin-btn.del{font-size:18px;color:var(--muted)}
.pin-error{color:var(--red);font-size:13px;margin-top:12px;min-height:20px}
.pin-setup-info{font-size:12px;color:var(--muted);margin-top:16px;text-align:center;line-height:1.5}

/* ── HEADER ── */
.header{background:var(--surface);padding:16px;padding-top:calc(16px + env(safe-area-inset-top));position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.header-row{display:flex;justify-content:space-between;align-items:flex-start}
.header h1{font-size:17px;font-weight:600}
.header .sub{font-size:11px;color:var(--muted);margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:6px 12px;font-size:12px;cursor:pointer}
.btn-sm:active{opacity:.7}
.notif-btn{font-size:18px;background:none;border:none;cursor:pointer;padding:4px}

/* ── CONTENU ── */
.content{padding:12px}
.section{margin-bottom:14px}
.stitle{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding:0 2px}

/* ── CARTES MACRO ── */
.cards2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.card .lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
.card .val{font-size:22px;font-weight:700;letter-spacing:-.5px}
.card .sub{font-size:12px;color:var(--muted);margin-top:2px}
.card-wide{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}

/* ── ALERTE ── */
.alerte-card{background:#2a1010;border:1px solid #5a2020;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.alerte-card .titre{font-size:12px;font-weight:700;color:var(--red);margin-bottom:3px}
.alerte-card .body{font-size:12px;color:#ffaaaa;line-height:1.5}

/* ── STATS ── */
.stats3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.stat{background:var(--surface2);border-radius:10px;padding:10px;text-align:center}
.stat .num{font-size:26px;font-weight:700}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* ── SIGNAL ROW ── */
.signal-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.signal-row:last-child{border-bottom:none}
.score-num{font-size:20px;font-weight:700;width:36px;text-align:center;flex-shrink:0}
.sig-info{flex:1;min-width:0}
.sig-nom{font-size:14px;font-weight:600}
.sig-det{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sig-var{font-size:12px;font-weight:600;flex-shrink:0}

/* ── BADGE ── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;margin-right:4px}
.ba{background:#0a2a18;color:var(--green)}
.be{background:#2a0a0a;color:var(--red)}
.bs{background:#2a250a;color:var(--yellow)}

/* ── PORTEFEUILLE ── */
.pf-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.pf-row:last-child{border-bottom:none}
.pf-nom{font-weight:500}
.pf-right{text-align:right}
.pf-gp{font-weight:700;font-size:14px}
.pf-cours{font-size:11px;color:var(--muted);margin-top:1px}

/* ── TAGS ── */
.tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px;margin:2px}
.tg-force{background:#0a2a18;color:var(--green)}
.tg-sortie{background:#2a0a0a;color:var(--red)}
.tg-instit{background:#0a1a2a;color:var(--blue)}

/* ── NEWS ── */
.news-item{font-size:12px;color:var(--muted);padding:7px 0;border-bottom:1px solid var(--border);line-height:1.4}
.news-item:last-child{border-bottom:none}

/* ── PRÉCISION ── */
.prec-big{text-align:center;padding:8px 0}
.prec-big .num{font-size:44px;font-weight:700}
.prec-big .sub{font-size:12px;color:var(--muted);margin-top:4px}
.prec-sect{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.ps-row{background:var(--surface2);border-radius:8px;padding:7px 10px;display:flex;justify-content:space-between;font-size:12px}

/* ── LOADER / ERREUR ── */
.loader{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#2a1010;border:1px solid #5a2020;border-radius:12px;padding:20px;text-align:center;color:var(--red);font-size:13px;line-height:1.5}
.footer{text-align:center;font-size:11px;color:var(--muted);padding:8px 0 4px}

/* ── COULEURS ── */
.green{color:var(--green)}.red{color:var(--red)}.yellow{color:var(--yellow)}.blue{color:var(--blue)}
</style>
</head>
<body>

<!-- ÉCRAN PIN -->
<div id="pin-screen">
  <h2>Agent Bourse</h2>
  <p id="pin-label">Entrez votre code PIN</p>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="saisir(1)">1</button>
    <button class="pin-btn" onclick="saisir(2)">2</button>
    <button class="pin-btn" onclick="saisir(3)">3</button>
    <button class="pin-btn" onclick="saisir(4)">4</button>
    <button class="pin-btn" onclick="saisir(5)">5</button>
    <button class="pin-btn" onclick="saisir(6)">6</button>
    <button class="pin-btn" onclick="saisir(7)">7</button>
    <button class="pin-btn" onclick="saisir(8)">8</button>
    <button class="pin-btn" onclick="saisir(9)">9</button>
    <button class="pin-btn" onclick="saisir(0)" style="grid-column:2">0</button>
    <button class="pin-btn del" onclick="suppr()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-setup-info" id="pin-setup-info"></div>
</div>

<!-- APP PRINCIPALE -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-row">
      <div>
        <h1>Agent Bourse V4</h1>
        <div class="sub" id="last-update">Chargement...</div>
      </div>
      <div class="header-actions">
        <button class="notif-btn" id="notif-btn" onclick="demanderNotifs()" title="Activer les notifications">🔔</button>
        <button class="btn-sm" onclick="charger()">Actualiser</button>
      </div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loader"><div class="spinner"></div>Chargement...</div>
  </div>
</div>

<script>
const REPO = 'ArnaudKTZ/briefing-bourse';
const RAW  = `https://raw.githubusercontent.com/${REPO}/main`;
const PIN_KEY    = 'ab_pin';
const PIN_SET_KEY = 'ab_pin_set';

// ── PIN ──────────────────────────────────────────────────────────────────────
let saisie = '';
let modeConfig = false;
let pinTemp = '';

function initPin() {
  const pinSauvegarde = localStorage.getItem(PIN_SET_KEY);
  if (!pinSauvegarde) {
    modeConfig = true;
    document.getElementById('pin-label').textContent = 'Choisissez un code PIN à 4 chiffres';
    document.getElementById('pin-setup-info').textContent = 'Ce code protège l\'accès à votre application.';
  }
}

function saisir(chiffre) {
  if (saisie.length >= 4) return;
  saisie += chiffre;
  majDots();
  if (saisie.length === 4) {
    setTimeout(() => validerPin(), 150);
  }
}

function suppr() {
  saisie = saisie.slice(0, -1);
  majDots();
  document.getElementById('pin-error').textContent = '';
}

function majDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < saisie.length);
  }
}

function validerPin() {
  if (modeConfig) {
    if (!pinTemp) {
      pinTemp = saisie;
      saisie = '';
      majDots();
      document.getElementById('pin-label').textContent = 'Confirmez votre code PIN';
      document.getElementById('pin-setup-info').textContent = '';
    } else {
      if (saisie === pinTemp) {
        localStorage.setItem(PIN_SET_KEY, '1');
        localStorage.setItem(PIN_KEY, saisie);
        ouvrirApp();
      } else {
        document.getElementById('pin-error').textContent = 'Les codes ne correspondent pas. Recommencez.';
        pinTemp = '';
        saisie = '';
        majDots();
        document.getElementById('pin-label').textContent = 'Choisissez un code PIN à 4 chiffres';
      }
    }
  } else {
    const pinSauvegarde = localStorage.getItem(PIN_KEY);
    if (saisie === pinSauvegarde) {
      ouvrirApp();
    } else {
      document.getElementById('pin-error').textContent = 'Code incorrect. Réessayez.';
      saisie = '';
      majDots();
    }
  }
}

function ouvrirApp() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  charger();
  initSW();
}

// ── SERVICE WORKER & NOTIFICATIONS ───────────────────────────────────────────
async function initSW() {
  if (!('serviceWorker' in navigator)) return;
  const reg = await navigator.serviceWorker.register('sw.js');
  await navigator.serviceWorker.ready;
  if (reg.active) reg.active.postMessage('START_POLLING');
}

async function demanderNotifs() {
  if (!('Notification' in window)) {
    alert('Les notifications ne sont pas supportées sur ce navigateur.\nSur iPhone, installez l\'app sur l\'écran d\'accueil d\'abord.');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    document.getElementById('notif-btn').textContent = '🔔';
    document.getElementById('notif-btn').style.opacity = '1';
    new Notification('Agent Bourse', { body: 'Notifications activées ! Vous serez alerté des signaux forts.' });
  } else {
    alert('Notifications refusées. Activez-les dans Réglages > Safari > Notifications.');
  }
}

// ── DONNÉES ──────────────────────────────────────────────────────────────────
async function fetchJSON(f) {
  const r = await fetch(`${RAW}/${f}?t=${Date.now()}`);
  if (!r.ok) throw new Error(f);
  return r.json();
}

function pct(v, dec=2) {
  if (v === null || v === undefined || v === '') return '—';
  const n = parseFloat(v);
  return `${n >= 0 ? '+' : ''}${n.toFixed(dec)}%`;
}

function cp(v) { return parseFloat(v) >= 0 ? 'green' : 'red'; }

function sc(s) {
  if (s >= 65) return 'var(--green)';
  if (s <= 35) return 'var(--red)';
  return 'var(--yellow)';
}

function bdg(sig) {
  if (sig === 'ACHETER') return '<span class="badge ba">ACHETER</span>';
  if (sig === 'ÉVITER')  return '<span class="badge be">ÉVITER</span>';
  return '<span class="badge bs">SURV.</span>';
}

async function charger() {
  document.getElementById('content').innerHTML = '<div class="loader"><div class="spinner"></div>Chargement...</div>';

  try {
    const [rPerf, rId, rNews, rEspion] = await Promise.allSettled([
      fetchJSON('performance.json'),
      fetchJSON('intraday_scores.json'),
      fetchJSON('rapport_news.json'),
      fetchJSON('rapport_espion.json'),
    ]);

    const perf   = rPerf.status   === 'fulfilled' ? rPerf.value   : null;
    const id     = rId.status     === 'fulfilled' ? rId.value     : null;
    const news   = rNews.status   === 'fulfilled' ? rNews.value   : null;
    const espion = rEspion.status === 'fulfilled' ? rEspion.value : null;

    // Extraire la dernière session intraday
    let scores = {};
    let dateId = '', heureId = '';
    if (id) {
      const dates = Object.keys(id).sort();
      const lastDate = dates[dates.length - 1];
      if (lastDate) {
        const heures = Object.keys(id[lastDate]).sort();
        const lastH  = heures[heures.length - 1];
        if (lastH) {
          scores  = id[lastDate][lastH];
          dateId  = lastDate;
          heureId = lastH;
        }
      }
    }

    const liste = Object.entries(scores).filter(([,d]) => d && !d.erreur);
    const nb_ach = liste.filter(([,d]) => d.signal === 'ACHETER').length;
    const nb_evi = liste.filter(([,d]) => d.signal === 'ÉVITER').length;
    const nb_sur = liste.filter(([,d]) => d.signal === 'SURVEILLER').length;

    let html = '';

    // ── MACRO ──
    const cac    = Object.values(scores).find(d => d.cours)?.cours;
    const cacVar = liste.length > 0 ? (liste.reduce((s,[,d]) => s + (d.variation||0), 0) / liste.length) : null;

    const fg    = news?.marche?.fear_greed_score ?? null;
    const fgLbl = news?.marche?.fear_greed_label ?? '';
    const malus = news?.marche?.malus_global ?? 0;

    html += `<div class="section"><div class="stitle">Marché</div><div class="cards2">`;
    html += `<div class="card"><div class="lbl">CAC 40</div><div class="val">${cac ? Math.round(cac).toLocaleString('fr') : '—'}</div><div class="sub ${cacVar !== null ? cp(cacVar) : ''}">${cacVar !== null ? pct(cacVar) : '—'}</div></div>`;
    html += `<div class="card"><div class="lbl">Fear & Greed</div><div class="val ${fg !== null ? (fg < 30 ? 'red' : fg > 60 ? 'green' : 'yellow') : ''}">${fg ?? '—'}</div><div class="sub">${fgLbl || '—'}</div></div>`;
    html += `</div></div>`;

    if (fg !== null && fg < 30) {
      html += `<div class="alerte-card"><div class="titre">Peur extrême — ${fg}/100</div><div class="body">Biais défensif. Malus ${malus} pts appliqué sur tous les scores.</div></div>`;
    }

    // ── RÉSUMÉ ──
    if (liste.length > 0) {
      html += `<div class="section"><div class="stitle">CAC 40 — résumé</div><div class="stats3">`;
      html += `<div class="stat"><div class="num green">${nb_ach}</div><div class="lbl">ACHETER</div></div>`;
      html += `<div class="stat"><div class="num yellow">${nb_sur}</div><div class="lbl">SURV.</div></div>`;
      html += `<div class="stat"><div class="num red">${nb_evi}</div><div class="lbl">ÉVITER</div></div>`;
      html += `</div></div>`;
    }

    // ── TOP ACHETER ──
    const topAch = liste.filter(([,d]) => d.signal === 'ACHETER').sort(([,a],[,b]) => b.score - a.score).slice(0, 7);
    if (topAch.length > 0) {
      html += `<div class="section"><div class="stitle">Opportunités du jour</div><div class="card-wide">`;
      topAch.forEach(([nom, d]) => {
        const det = [
          d.rsi   ? `RSI ${parseFloat(d.rsi).toFixed(0)}`   : '',
          d.macd  ? `MACD ${d.macd}`  : '',
          d.momentum_intraday ? `Mom ${pct(d.momentum_intraday,1)}` : '',
        ].filter(Boolean).join(' · ');
        html += `<div class="signal-row">
          <div class="score-num" style="color:${sc(d.score)}">${d.score}</div>
          <div class="sig-info">
            <div class="sig-nom">${bdg(d.signal)}${nom}</div>
            <div class="sig-det">${det || '—'}</div>
          </div>
          <div class="sig-var ${cp(d.variation)}">${pct(d.variation)}</div>
        </div>`;
      });
      html += `</div></div>`;
    }

    // ── ÉVITER ──
    const topEvi = liste.filter(([,d]) => d.signal === 'ÉVITER').sort(([,a],[,b]) => a.score - b.score).slice(0, 5);
    if (topEvi.length > 0) {
      html += `<div class="section"><div class="stitle">À éviter</div><div class="card-wide">`;
      topEvi.forEach(([nom, d]) => {
        const det = [
          d.rsi  ? `RSI ${parseFloat(d.rsi).toFixed(0)}`  : '',
          d.macd ? `MACD ${d.macd}` : '',
        ].filter(Boolean).join(' · ');
        html += `<div class="signal-row">
          <div class="score-num" style="color:${sc(d.score)}">${d.score}</div>
          <div class="sig-info">
            <div class="sig-nom">${bdg(d.signal)}${nom}</div>
            <div class="sig-det">${det || '—'}</div>
          </div>
          <div class="sig-var ${cp(d.variation)}">${pct(d.variation)}</div>
        </div>`;
      });
      html += `</div></div>`;
    }

    // ── PORTEFEUILLE ──
    const histo = perf?.historique || {};
    const dates = Object.keys(histo).sort();
    const lastDate = dates[dates.length - 1];
    const lastSignaux = lastDate ? histo[lastDate] : {};

    // Positions ouvertes = signaux ACHETER d'hier qui ne sont pas encore ÉVITER
    const positions = Object.entries(lastSignaux).filter(([,d]) => d.signal === 'ACHETER').slice(0, 8);

    if (positions.length > 0 || perf?.stats) {
      html += `<div class="section"><div class="stitle">Portefeuille virtuel</div>`;

      if (perf?.stats) {
        const s = perf.stats;
        const prec = s.precision || 0;
        html += `<div class="cards2" style="margin-bottom:8px">`;
        html += `<div class="card"><div class="lbl">Précision</div><div class="val ${prec >= 55 ? 'green' : prec >= 40 ? 'yellow' : 'red'}">${prec}%</div><div class="sub">${s.total || 0} signaux</div></div>`;
        html += `<div class="card"><div class="lbl">ACHETER ok</div><div class="val">${s.acheter_corrects || 0}/${s.acheter_total || 0}</div><div class="sub">ÉVITER ok ${s.eviter_corrects || 0}/${s.eviter_total || 0}</div></div>`;
        html += `</div>`;
      }

      if (positions.length > 0) {
        html += `<div class="card-wide">`;
        positions.forEach(([nom, d]) => {
          const cours_actuel = scores[nom]?.cours;
          const prix_achat   = d.prix;
          const gp = cours_actuel && prix_achat ? ((cours_actuel - prix_achat) / prix_achat * 100) : null;
          html += `<div class="pf-row">
            <div class="pf-nom">${nom}</div>
            <div class="pf-right">
              <div class="pf-gp ${gp !== null ? cp(gp) : ''}">${gp !== null ? pct(gp) : '—'}</div>
              <div class="pf-cours">${prix_achat ? prix_achat.toFixed(2) + '€' : '—'} ${cours_actuel ? '→ ' + cours_actuel.toFixed(2) + '€' : ''}</div>
            </div>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    }

    // ── AGENTS ──
    if (espion || news) {
      html += `<div class="section"><div class="stitle">Agents</div><div class="card-wide">`;

      if (espion?.resume) {
        const res = espion.resume;
        if (res.secteurs_en_force?.length) {
          html += `<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:5px">Secteurs en force</div>`;
          res.secteurs_en_force.forEach(s => { html += `<span class="tag tg-force">${s}</span>`; });
          html += `</div>`;
        }
        if (res.secteurs_en_sortie?.length) {
          html += `<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:5px">Secteurs en sortie</div>`;
          res.secteurs_en_sortie.forEach(s => { html += `<span class="tag tg-sortie">${s}</span>`; });
          html += `</div>`;
        }
        if (res.top_achats_instit?.length) {
          html += `<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--muted);margin-bottom:5px">Accumulation institutionnelle</div>`;
          res.top_achats_instit.slice(0,5).forEach(s => { html += `<span class="tag tg-instit">${s}</span>`; });
          html += `</div>`;
        }
      }

      if (news?.marche?.titres_cles?.length) {
        html += `<div style="${espion ? 'border-top:1px solid var(--border);padding-top:10px;margin-top:4px' : ''}">`;
        html += `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Presse (${news.heure || ''})</div>`;
        news.marche.titres_cles.slice(0,3).forEach(t => {
          html += `<div class="news-item">${t}</div>`;
        });
        html += `</div>`;
      }
      html += `</div></div>`;
    }

    // ── PRÉCISION PAR SECTEUR ──
    if (perf?.stats?.par_secteur) {
      const ps = perf.stats.par_secteur;
      html += `<div class="section"><div class="stitle">Précision par secteur</div><div class="prec-sect">`;
      Object.entries(ps).forEach(([sect, d]) => {
        const p = d.total > 0 ? Math.round(d.corrects / d.total * 100) : 0;
        html += `<div class="ps-row"><span>${sect}</span><span class="${p >= 55 ? 'green' : p >= 40 ? 'yellow' : 'red'}">${p}%</span></div>`;
      });
      html += `</div></div>`;
    }

    // Mettre à jour la date
    document.getElementById('last-update').textContent =
      dateId && heureId ? `Intraday ${dateId} ${heureId}` : 'Données GitHub';

    html += `<div class="footer">Agent Bourse V4 · Actualisation auto toutes les 5 min</div>`;
    document.getElementById('content').innerHTML = html;

  } catch(err) {
    document.getElementById('content').innerHTML =
      `<div class="err">Erreur de chargement<br><small style="color:#ff8888">${err.message}</small></div>`;
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
initPin();

// Actualisation auto toutes les 5 min
setInterval(() => {
  if (document.getElementById('app').style.display !== 'none') charger();
}, 5 * 60 * 1000);
</script>
</body>
</html>
