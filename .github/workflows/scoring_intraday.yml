name: Scoring Intraday CAC40

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 9h heure française (UTC+2 été)
    - cron: '30 9 * * 1-5'  # 11h30 heure française
    - cron: '0 12 * * 1-5'  # 14h heure française
    - cron: '0 14 * * 1-5'  # 16h heure française
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scorer:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install anthropic yfinance ta pandas numpy

      - name: Lancer le scoring intraday
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          DESTINATAIRES: ${{ secrets.DESTINATAIRES }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scoring_intraday.py

      - name: Sauvegarder sur GitHub
        run: |
          git config user.name "Agent Bourse"
          git config user.email "actions@github.com"
          git add intraday_scores.json alertes_envoyees.json costs_log.json portefeuille_virtuel.json || true
          git diff --staged --quiet || git commit -m "Scoring intraday $(date +%Y-%m-%d\ %H:%M)" || true
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true
