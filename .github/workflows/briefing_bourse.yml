name: Briefing Bourse Quotidien V2

on:
  schedule:
    - cron: '0 5 * * 1-5'  # 7h heure française (UTC+2 en été), lundi au vendredi
  workflow_dispatch:         # lancement manuel depuis GitHub

permissions:
  contents: write

jobs:
  envoyer-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install anthropic yfinance ta pandas numpy

      - name: Lancer l'agent bourse V3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          DESTINATAIRES: ${{ secrets.DESTINATAIRES }}
        run: python briefing_bourse_v3.py

      - name: Sauvegarder la performance sur GitHub
        run: |
          git config user.name "Agent Bourse"
          git config user.email "actions@github.com"
          git add performance.json portefeuille_virtuel.json dernier_briefing.json || true
          git diff --staged --quiet || git commit -m "Performance update $(date +%Y-%m-%d)" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true
