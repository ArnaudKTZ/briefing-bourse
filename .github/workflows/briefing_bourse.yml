name: Briefing Bourse Quotidien V2

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 8h heure française (UTC+1), lundi au vendredi
  workflow_dispatch:         # lancement manuel depuis GitHub

jobs:
  envoyer-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install anthropic yfinance ta pandas

      - name: Lancer l'agent bourse V2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
        run: python briefing_bourse_v2.py

      - name: Sauvegarder la performance sur GitHub
        run: |
          git config user.name "Agent Bourse"
          git config user.email "actions@github.com"
          git add performance.json
          git diff --staged --quiet || git commit -m "Performance update $(date +%Y-%m-%d)"
          git push
