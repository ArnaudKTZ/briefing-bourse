name: Agent Dividendes PEA hebdomadaire

on:
  schedule:
    - cron: '5 6 * * 1'  # Lundi 8h05 heure française (UTC+2 été) — après le briefing de 7h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rapport-dividendes:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install yfinance pandas numpy

      - name: Lancer l'agent Dividendes
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
        run: python agent_dividendes.py

      - name: Sauvegarder le rapport sur GitHub
        run: |
          git config user.name "Agent Bourse"
          git config user.email "actions@github.com"
          git add dividendes_rapport.json || true
          git diff --staged --quiet || git commit -m "Rapport dividendes $(date +%Y-%m-%d)" || true
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true
